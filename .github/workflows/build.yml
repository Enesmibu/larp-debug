name: Build and Release

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Build mod
        run: gradle build --no-daemon

      - name: Get mod version
        id: version
        run: echo "version=$(grep mod_version gradle.properties | cut -d'=' -f2 | tr -d ' ')" >> $GITHUB_OUTPUT

      - name: Upload JAR as artifact
        uses: actions/upload-artifact@v4
        with:
          name: larp-debug-${{ steps.version.outputs.version }}
          path: build/libs/larp-debug-${{ steps.version.outputs.version }}.jar
          if-no-files-found: error

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-build-${{ github.run_number }}
          name: "Larp Debug v${{ steps.version.outputs.version }} (Build #${{ github.run_number }})"
          body: |
            ## Larp Debug v${{ steps.version.outputs.version }}

            Otomatik derlenen build.

            ### Kurulum
            1. `larp-debug-${{ steps.version.outputs.version }}.jar` dosyasını Minecraft `mods/` klasörüne koy
            2. Meteor Client JAR'ının da `mods/` klasöründe olduğundan emin ol
            3. Fabric Loader 1.21.4 ile Minecraft'ı başlat
            4. Meteor Client → **Larp Debug** sekmesi → **LarpDebugV7** modülünü aç

            ### Değişiklikler
            Commit: ${{ github.sha }}
          files: build/libs/larp-debug-${{ steps.version.outputs.version }}.jar
          draft: false
          prerelease: false
